name: Publish Docker image

on:
  push:
    branches: [master]
  schedule:
    # Weekly rebuild to pick up upstream barcodebuddy source changes
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      bbuddy_github_repo:
        description: "Source repo for BarcodeBuddy (owner/repo)"
        required: false
        default: "zuzak/barcodebuddy"
      bbuddy_ref:
        description: "Git ref (branch/tag/SHA) of source repo"
        required: false
        default: "master"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build and push to GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repository name
        id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ steps.repo.outputs.name }}:latest
          build-args: |
            BBUDDY_GITHUB_REPO=${{ inputs.bbuddy_github_repo || 'zuzak/barcodebuddy' }}
            BBUDDY_REF=${{ inputs.bbuddy_ref || 'master' }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VERSION=${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/${{ steps.repo.outputs.name }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ steps.repo.outputs.name }}:buildcache,mode=max
